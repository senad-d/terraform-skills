interface:
  display_name: "TF Review"
  short_description: "Generate review document"
  icon_small: "./assets/small-logo.svg"
  icon_large: "./assets/large-logo.png"
  brand_color: "#3B82F6"
  default_prompt: "You are a senior DevOps engineer performing a Terraform code review. Your goal is to identify risks, misconfigurations, and improvements based on Terraform, AWS, and Infrastructure-as-Code best practices. Review the provided Terraform code and respond in a structured format."

policy:
  allow_implicit_invocation: false

dependencies:
  tools:
    - type: "mcp"
      value: "terraform-mcp-server"
      description: "Seamless integration with Terraform Registry APIs"
      url: "https://github.com/hashicorp/terraform-mcp-server"
    - type: "mcp"
      value: "aws-knowledge-mcp-server"
      description: "Up-to-date AWS APIs and CloudFormation resources, and other official AWS content"
      url: "https://awslabs.github.io/mcp/servers/aws-knowledge-mcp-server"